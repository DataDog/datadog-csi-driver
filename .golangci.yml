version: "2"

run:
  timeout: 10m
  modules-download-mode: readonly
  tests: false

linters:
  enable:
    - goheader
  exclusions:
    paths:
      - "testing.go"
      - ".*\\.pb\\.go"
      - ".*\\.gen\\.go"
  settings:
    misspell:
      locale: US
    goheader:
      template: |-
        Datadog datadog-csi driver
        Copyright 2025-present Datadog, Inc.

        This product includes software developed at Datadog (https://www.datadoghq.com/).
